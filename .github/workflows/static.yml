name: Deploy TanStack App to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Prepare static files for GitHub Pages
        run: |
          # Cria a pasta dist
          mkdir -p dist
          
          # Verifica se .output/public existe
          if [ -d ".output/public" ]; then
            # Copia o conteúdo de .output/public para dist
            cp -R .output/public/* dist/
            echo "Arquivos copiados de .output/public"
            
            # Se o index.html estiver em uma subpasta, move para a raiz
            if [ -f "dist/index.html" ]; then
              echo "index.html encontrado na raiz"
            else
              # Procura por index.html em subpastas
              find dist -name "index.html" -exec cp {} dist/ \;
              echo "index.html copiado para a raiz"
            fi
          else
            echo "Erro: Pasta .output/public não encontrada"
            echo "Conteúdo do diretório atual:"
            ls -la
            exit 1
          fi
          
          # Mostra o conteúdo final da pasta dist
          echo "Conteúdo final da pasta dist:"
          ls -la dist/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
