name: Deploy TanStack App to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Prepare static files
        run: |
          # Cria a pasta dist se não existir
          mkdir -p dist
          
          # Se existir .output/public, copia para dist
          if [ -d ".output/public" ]; then
            cp -R .output/public/* dist/
            echo "Arquivos copiados de .output/public"
          elif [ -d ".output" ]; then
            # Copia apenas arquivos estáticos
            find .output -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" -o -name "*.json" -o -name "*.png" -o -name "*.svg" -o -name "*.ico" -o -name "*.webp" -o -name "*.woff2" -o -name "*.ttf" \) -exec cp --parents {} dist/ \;
            echo "Arquivos estáticos copiados de .output"
          else
            echo "Erro: Nenhuma pasta .output encontrada"
            exit 1
          fi

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
