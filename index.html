<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TO Melhoria Contínua</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: white;
            padding: 60px 80px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 2.5rem;
            color: #1a365d;
            margin-bottom: 10px;
        }
        .emoji {
            font-size: 4rem;
        }
        p {
            color: #4a5568;
            font-size: 1.2rem;
        }
        .status {
            margin-top: 20px;
            padding: 10px 20px;
            background: #48bb78;
            color: white;
            border-radius: 50px;
            display: inline-block;
            font-weight: bold;
        }
        .link {
            margin-top: 20px;
            display: block;
            color: #4299e1;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🚀</div>
        <h1>TO Melhoria Contínua</h1>
        <p>Site publicado com sucesso!</p>
        <div class="status">✅ Online</div>
        <a class="link" href="https://github.com/RaquelFranca-tech/TOMelhoriaContinuaV2" target="_blank">
            Ver repositório →
        </a>
    </div>

</html>
